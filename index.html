<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #header {
      text-align: center;
      padding: 24px 16px 8px;
      width: 100%;
      max-width: 480px;
    }
    #agent-name {
      font-size: 20px;
      font-weight: 600;
      color: #1e293b;
    }
    #chat-area {
      flex: 1;
      width: 100%;
      max-width: 480px;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .bubble {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .bubble.assistant {
      background: #e2e8f0;
      color: #1e293b;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .bubble.user {
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    #controls {
      width: 100%;
      max-width: 480px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    #mic-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: none;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #mic-btn:hover { transform: scale(1.05); }
    #mic-btn.listening {
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(30,64,175,0.4); }
      50% { transform: scale(1.08); box-shadow: 0 0 0 16px rgba(30,64,175,0); }
    }
    #status {
      font-size: 13px;
      color: #64748b;
      min-height: 20px;
    }
    #booking-area {
      display: none;
      width: 100%;
      max-width: 480px;
      padding: 0 16px 16px;
      text-align: center;
    }
    #booking-area a {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 8px;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
    }
    #text-link-btn {
      background: none;
      border: none;
      color: #64748b;
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div id="header">
    <div id="agent-name"></div>
  </div>
  <div id="chat-area"></div>
  <div id="controls">
    <button id="mic-btn">&#127908;</button>
    <div id="status"></div>
  </div>
  <div id="booking-area">
    <a id="booking-link" href="#" target="_blank">Book an Appointment</a>
    <br>
    <button id="text-link-btn">Text me the link</button>
  </div>
  <audio id="audio-player"></audio>

  <script>
    let config = {};
    let history = [];
    let isProcessing = false;

    const chatArea = document.getElementById('chat-area');
    const micBtn = document.getElementById('mic-btn');
    const status = document.getElementById('status');
    const audioPlayer = document.getElementById('audio-player');
    const bookingArea = document.getElementById('booking-area');
    const bookingLink = document.getElementById('booking-link');
    const textLinkBtn = document.getElementById('text-link-btn');

    async function init() {
      const res = await fetch('config.json');
      config = await res.json();

      document.title = config.business.name + ' Voice Agent';
      document.getElementById('agent-name').textContent =
        config.branding.agentName + ' from ' + config.business.name;

      micBtn.style.background = config.branding.primaryColor;
      document.querySelector('#booking-area a').style.background = config.branding.primaryColor;
      document.querySelector('.bubble.user, #dummy')?.style?.setProperty?.('background', config.branding.primaryColor);

      bookingLink.href = config.bookingLink;

      addBubble(config.greeting, 'assistant');
      history.push({ role: 'assistant', content: config.greeting });
    }

    function addBubble(text, role) {
      const div = document.createElement('div');
      div.className = 'bubble ' + role;
      div.textContent = text;
      if (role === 'user') {
        div.style.background = config.branding.primaryColor;
      }
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function showBooking() {
      bookingArea.style.display = 'block';
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      status.textContent = 'Speech recognition not supported in this browser.';
      micBtn.disabled = true;
    }

    micBtn.addEventListener('click', () => {
      if (isProcessing || !SpeechRecognition) return;

      const recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.lang = 'en-US';

      micBtn.classList.add('listening');
      status.textContent = 'Listening...';

      recognition.onresult = async (event) => {
        const transcript = event.results[0][0].transcript;
        micBtn.classList.remove('listening');
        status.textContent = 'Thinking...';
        isProcessing = true;

        addBubble(transcript, 'user');
        history.push({ role: 'user', content: transcript });

        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: transcript, history }),
          });

          const data = await res.json();

          addBubble(data.text, 'assistant');
          history.push({ role: 'assistant', content: data.text });

          // Play audio
          const audioBlob = new Blob(
            [Uint8Array.from(atob(data.audio), c => c.charCodeAt(0))],
            { type: 'audio/mpeg' }
          );
          audioPlayer.src = URL.createObjectURL(audioBlob);
          audioPlayer.play();

          // Check if booking link should be shown
          const lower = data.text.toLowerCase();
          if (lower.includes('book') || lower.includes('schedule') || lower.includes('calendly') || lower.includes('appointment')) {
            showBooking();
          }
        } catch (err) {
          addBubble('Sorry, something went wrong. Please try again.', 'assistant');
        }

        isProcessing = false;
        status.textContent = '';
      };

      recognition.onerror = () => {
        micBtn.classList.remove('listening');
        status.textContent = 'Could not hear you. Tap to try again.';
        setTimeout(() => { status.textContent = ''; }, 3000);
      };

      recognition.onend = () => {
        if (!isProcessing) {
          micBtn.classList.remove('listening');
          status.textContent = '';
        }
      };

      recognition.start();
    });

    textLinkBtn.addEventListener('click', () => {
      const url = window.location.href;
      if (navigator.share) {
        navigator.share({ title: config.business.name, url });
      } else {
        navigator.clipboard.writeText(url).then(() => {
          textLinkBtn.textContent = 'Link copied!';
          setTimeout(() => { textLinkBtn.textContent = 'Text me the link'; }, 2000);
        });
      }
    });

    init();
  </script>
</body>
</html>
