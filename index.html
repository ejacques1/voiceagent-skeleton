<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #header {
      text-align: center;
      padding: 20px 16px 12px;
      width: 100%;
      max-width: 480px;
    }
    #agent-name {
      font-size: 18px;
      font-weight: 600;
      color: #1e293b;
    }
    #chat-area {
      flex: 1;
      width: 100%;
      max-width: 480px;
      overflow-y: auto;
      padding: 8px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.45;
      word-wrap: break-word;
    }
    .bubble.assistant {
      background: #e2e8f0;
      color: #1e293b;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .bubble.user {
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .bubble .typing {
      display: inline-block;
      font-style: italic;
      color: #94a3b8;
    }
    #input-area {
      width: 100%;
      max-width: 480px;
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      background: #fff;
      border-top: 1px solid #e2e8f0;
    }
    #msg-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 24px;
      font-size: 15px;
      outline: none;
      font-family: inherit;
    }
    #msg-input:focus {
      border-color: #94a3b8;
    }
    #send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #booking-area {
      display: none;
      width: 100%;
      max-width: 480px;
      padding: 0 16px 12px;
      text-align: center;
    }
    #booking-area a {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 8px;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="header">
    <div id="agent-name"></div>
  </div>
  <div id="chat-area"></div>
  <div id="booking-area">
    <a id="booking-link" href="#" target="_blank">Book an Appointment</a>
  </div>
  <div id="input-area">
    <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
    <button id="send-btn">&#10148;</button>
  </div>

  <script>
    let config = {};
    let history = [];
    let isProcessing = false;

    const chatArea = document.getElementById('chat-area');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const bookingArea = document.getElementById('booking-area');
    const bookingLink = document.getElementById('booking-link');

    async function init() {
      const res = await fetch('config.json');
      config = await res.json();

      document.title = config.business.name + ' Chat';
      document.getElementById('agent-name').textContent =
        config.branding.agentName + ' from ' + config.business.name;

      sendBtn.style.background = config.branding.primaryColor;
      document.querySelector('#booking-area a').style.background = config.branding.primaryColor;

      bookingLink.href = config.bookingLink;

      addBubble(config.greeting, 'assistant');
      history.push({ role: 'assistant', content: config.greeting });

      msgInput.focus();
    }

    function addBubble(text, role) {
      const div = document.createElement('div');
      div.className = 'bubble ' + role;
      if (role === 'user') {
        div.textContent = text;
        div.style.background = config.branding.primaryColor;
      } else {
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        const parts = text.split(urlRegex);
        parts.forEach(part => {
          if (urlRegex.test(part)) {
            const a = document.createElement('a');
            a.href = part;
            a.textContent = 'Book Your Appointment';
            a.target = '_blank';
            a.style.cssText = 'color:' + config.branding.primaryColor + ';font-weight:600;text-decoration:underline;';
            div.appendChild(a);
            showBooking();
          } else {
            div.appendChild(document.createTextNode(part));
          }
          urlRegex.lastIndex = 0;
        });
      }
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
      return div;
    }

    function showBooking() {
      bookingArea.style.display = 'block';
    }

    async function sendMessage() {
      const text = msgInput.value.trim();
      if (!text || isProcessing) return;

      isProcessing = true;
      sendBtn.disabled = true;
      msgInput.value = '';

      addBubble(text, 'user');
      history.push({ role: 'user', content: text });

      // Show typing indicator
      const typingBubble = addBubble('', 'assistant');
      typingBubble.innerHTML = '<span class="typing">Typing...</span>';

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history }),
        });

        const data = await res.json();

        // Replace typing indicator with actual response
        typingBubble.innerHTML = '';
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        const parts = data.text.split(urlRegex);
        parts.forEach(part => {
          if (urlRegex.test(part)) {
            const a = document.createElement('a');
            a.href = part;
            a.textContent = 'Book Your Appointment';
            a.target = '_blank';
            a.style.cssText = 'color:' + config.branding.primaryColor + ';font-weight:600;text-decoration:underline;';
            typingBubble.appendChild(a);
            showBooking();
          } else {
            typingBubble.appendChild(document.createTextNode(part));
          }
          urlRegex.lastIndex = 0;
        });

        history.push({ role: 'assistant', content: data.text });
      } catch (err) {
        typingBubble.textContent = 'Sorry, something went wrong. Please try again.';
      }

      isProcessing = false;
      sendBtn.disabled = false;
      msgInput.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    init();
  </script>
</body>
</html>
